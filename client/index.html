<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>moi.computer</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <!-- React is vendored locally (client/vendor/react, generated by
         scripts/build-vendor.ts) and served by the /vendor/react route, so Moi
         runs fully offline — no CDN fetch. The server picks the development or
         production build per environment behind these stable URLs. -->
    <script type="importmap">
      {
        "imports": {
          "react": "/vendor/react/react.js",
          "react/jsx-runtime": "/vendor/react/react-jsx-runtime.js",
          "react/jsx-dev-runtime": "/vendor/react/react-jsx-dev-runtime.js",
          "react-dom": "/vendor/react/react-dom.js",
          "react-dom/client": "/vendor/react/react-dom-client.js"
        }
      }
    </script>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
    <script type="module">
      const [react, jsxRuntime, jsxDevRuntime, reactDom, reactDomClient] = await Promise.all([
        import('react'),
        import('react/jsx-runtime'),
        import('react/jsx-dev-runtime'),
        import('react-dom'),
        import('react-dom/client')
      ])
      globalThis.__esm = {
        react: react,
        'react/jsx-runtime': jsxRuntime,
        'react/jsx-dev-runtime': jsxDevRuntime,
        'react-dom': reactDom,
        'react-dom/client': reactDomClient
      }
      globalThis.__init(document.getElementById('root'))
      //# sourceURL=react-preload.js
    </script>
  </body>
</html>
